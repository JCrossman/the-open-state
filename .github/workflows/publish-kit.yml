name: Publish kit

# Publish @open-state/kit to npm so other repos (alberta-assisted-living, DATS, …)
# can pin it. Runs when a `kit-v*` tag is pushed (cut a release → it publishes),
# and via manual dispatch to publish an existing tag (e.g. the current kit-v0.2.0).
#
# Auth uses the NPM_TOKEN repo secret (an npm automation token for the @open-state
# org). Publishing is idempotent-ish: npm rejects re-publishing an existing
# version, which is the desired safety.

on:
  push:
    tags: ["kit-v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to publish from (e.g. kit-v0.2.0)"
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build the kit
        run: pnpm --filter @open-state/kit build

      # On a tag push, the tag version must match the package version, so a
      # mistagged release can't publish the wrong number.
      - name: Verify tag matches kit version
        if: startsWith(github.ref, 'refs/tags/kit-v')
        run: |
          tag="${GITHUB_REF#refs/tags/kit-v}"
          pkg=$(node -p "require('./kit/package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "Tag kit-v$tag does not match kit/package.json version $pkg" >&2
            exit 1
          fi
          echo "Publishing @open-state/kit@$pkg"

      - name: Configure npm auth
        run: |
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (public)
        run: pnpm --filter @open-state/kit publish --no-git-checks --access public
