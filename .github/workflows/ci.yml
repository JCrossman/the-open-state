name: CI

# Gate every PR to main (and pushes to main) on a clean build + the offline test
# suite, across the whole workspace (@open-state/kit + the camping packages).
# Tests never touch live public services — recorded fixtures only — so CI is
# deterministic and never hammers an upstream (Constitution Art. 7.3).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm first, so setup-node's pnpm cache has a package manager to key on.
      # The version comes from the root packageManager field (pnpm@10.33.0);
      # the workspace root is the repo root (kit + open-state-camping packages).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Defense-in-depth: fail fast if obvious PII (real-looking email/phone/SIN)
      # slipped into a tracked file. Honestly partial — pairs with secret scanning
      # (credentials) and review (everything else). Needs only node + git.
      - name: PII tripwire
        run: node scripts/check-pii.mjs

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build (tsc — also typechecks)
        run: pnpm -r build

      - name: Test (offline, fixture-backed)
        run: pnpm -r test
