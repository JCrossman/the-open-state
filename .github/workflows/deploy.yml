name: Deploy preview

# Continuous preview deploys on every push to main, explicit released versions
# on a v* tag, and a manual button as a safety valve. Authentication to Azure is
# via OIDC (a short-lived token minted per run) - no long-lived secret lives in
# the repo, matching the project's "no secrets on disk or in the repo" posture.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write # required for the OIDC federated login
  contents: read

env:
  RESOURCE_GROUP: rg-open-state-preview
  CONTAINER_APP: openstate-camping
  ACR_NAME: openstateacrndpby7lehrm24
  IMAGE_REPO: open-state-camping

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The federated credential is bound to this environment, so the deploy job
    # must declare it to receive an Azure-exchangeable token.
    environment: preview
    defaults:
      run:
        working-directory: open-state-camping
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        # A v* tag deploys that version; any other ref deploys the commit SHA, so
        # every image is traceable to exactly what produced it.
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC)
        # These IDs are not secrets: they identify the app/tenant/subscription,
        # but grant nothing on their own. Access is gated by the federated trust
        # (this repo's `preview` environment only) plus the app's Contributor
        # role scoped to the rg-open-state-preview resource group.
        uses: azure/login@v2
        with:
          client-id: f19c4b5c-b4f9-4dff-a80e-907b9fa61560
          tenant-id: f201de84-2ce8-4868-be44-22195ef35ba6
          subscription-id: 7f2fd134-c6e1-45f1-91ca-515e1992f2e4

      - name: Build image in ACR
        # Builds in the registry; the runner needs no Docker daemon and no
        # registry password (the OIDC identity has AcrPush via its RG role).
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "${IMAGE_REPO}:${{ steps.tag.outputs.tag }}" \
            --file Dockerfile . \
            --only-show-errors

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP" \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_REPO}:${{ steps.tag.outputs.tag }}" \
            --only-show-errors

      - name: Smoke test the live endpoint
        # A deploy that does not answer /health is a failed deploy.
        run: |
          fqdn=$(az containerapp show -g "$RESOURCE_GROUP" -n "$CONTAINER_APP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Checking https://$fqdn/health"
          for i in $(seq 1 10); do
            if curl -fsS "https://$fqdn/health" | grep -q '"status":"ok"'; then
              echo "Healthy after $i attempt(s)."
              exit 0
            fi
            sleep 6
          done
          echo "Health check did not pass in time." >&2
          exit 1
